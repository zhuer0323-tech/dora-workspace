<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="釜山自由行">
<meta name="theme-color" content="#f48fb1">
<link rel="manifest" href="manifest.json">
<title>釜山自由行</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fff5f8;
    --card: #ffffff;
    --accent: #e91e8c;
    --accent2: #fce4ec;
    --accent3: #f8bbd0;
    --text: #3d1c2e;
    --text2: #b07090;
    --border: #f8d7e8;
    --green: #43a047;
    --yellow: #e65100;
    --blue: #7c4dff;
    --shadow: 0 2px 12px rgba(233,30,140,0.08);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 76px;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(120deg, #f48fb1 0%, #f06292 50%, #e91e8c 100%);
    padding: 14px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 16px rgba(233,30,140,0.25);
  }
  .header h1 { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
  .header .subtitle { font-size: 11px; color: rgba(255,255,255,0.85); margin-top: 2px; }
  .header-icon { font-size: 26px; }

  /* Banner 照片區 */
  .banner-wrap {
    position: relative;
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, #fce4ec, #f8bbd0);
    overflow: hidden;
    cursor: pointer;
  }
  .banner-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .banner-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: #e91e8c;
  }
  .banner-placeholder .icon { font-size: 40px; opacity: 0.6; }
  .banner-placeholder .text { font-size: 14px; font-weight: 600; opacity: 0.8; }
  .banner-placeholder .sub { font-size: 11px; opacity: 0.5; }
  .banner-btn {
    position: absolute;
    bottom: 10px; right: 10px;
    background: rgba(255,255,255,0.92);
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    color: #e91e8c;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #bannerInput { display: none; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 0 -2px 12px rgba(233,30,140,0.08);
  }
  .nav-btn {
    flex: 1;
    padding: 10px 4px 8px;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: color 0.2s;
  }
  .nav-btn span { font-size: 10px; font-weight: 600; }
  .nav-btn.active { color: var(--accent); }

  /* Pages */
  .page { display: none; }
  .page.active { display: block; }
  .page-inner { padding: 14px 14px 0; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 10px;
    font-weight: 700;
  }

  /* Buttons */
  .btn {
    background: linear-gradient(135deg, #f06292, #e91e8c);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    box-shadow: 0 2px 8px rgba(233,30,140,0.25);
  }
  .btn:active { opacity: 0.85; }
  .btn-outline {
    background: none;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    box-shadow: none;
  }
  .btn-sm {
    padding: 7px 14px;
    font-size: 12px;
    border-radius: 8px;
  }
  .btn-map {
    background: #03c75a;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    color: #fff;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 600;
    box-shadow: 0 2px 6px rgba(3,199,90,0.3);
  }

  /* Inputs */
  input, select, textarea {
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); background: #fff; }

  /* ── 行程頁面 ── */
  /* 天數橫向分頁 */
  .day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 10px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text2);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }
  .day-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(233,30,140,0.3);
  }
  /* 行程 item */
  .schedule-item {
    background: var(--card);
    border-radius: 12px;
    margin-bottom: 8px;
    border-left: 3px solid var(--accent);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .item-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .item-time {
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
    width: 60px;
    flex-shrink: 0;
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-place { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .item-note-preview {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-toggle {
    font-size: 11px;
    color: var(--text2);
    flex-shrink: 0;
    transition: transform 0.25s;
  }
  .item-toggle.open { transform: rotate(180deg); }
  .item-detail {
    display: none;
    padding: 10px 14px 14px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .item-detail.open { display: block; }
  .detail-block { margin-bottom: 10px; }
  .detail-label {
    font-size: 10px;
    font-weight: 800;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }
  .detail-text { font-size: 13px; color: var(--text); line-height: 1.8; }
  .item-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
  .btn-taxi {
    background: #1565c0;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    color: #fff;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 600;
    box-shadow: 0 2px 6px rgba(21,101,192,0.3);
  }
  /* 叫車提醒 modal */
  .reminder-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    padding: 0 16px 20px;
  }
  .reminder-sheet {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }
  .reminder-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: var(--text); }
  .reminder-sub { font-size: 13px; color: var(--text2); margin-bottom: 18px; }
  .reminder-options { display: flex; gap: 10px; margin-bottom: 16px; }
  .reminder-opt {
    flex: 1;
    padding: 12px 6px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    color: var(--text);
  }
  .reminder-opt.sel { border-color: var(--accent); background: var(--accent2); color: var(--accent); }
  .reminder-cancel { width: 100%; padding: 12px; border: none; background: none; color: var(--text2); font-size: 14px; cursor: pointer; margin-top: 6px; }
  .reminder-sheet { max-height: 88vh; overflow-y: auto; }
  .btn-edit {
    background: var(--accent2);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    color: var(--accent);
    border: 1.5px solid var(--accent3);
    cursor: pointer;
    white-space: nowrap;
    font-weight: 600;
  }

  /* 新增行程表單 */
  .add-form {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1.5px solid var(--accent);
    display: none;
    box-shadow: var(--shadow);
  }
  .add-form.open { display: block; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-row > * { flex: 1; }
  .form-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 600; }

  /* ── 匯率頁面 ── */
  .rate-display { text-align: center; padding: 20px 0; }
  .rate-big { font-size: 40px; font-weight: 800; color: var(--accent); }
  .rate-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .rate-updated { font-size: 11px; color: var(--text2); margin-top: 8px; }
  .converter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .converter-row .arrow { font-size: 20px; color: var(--text2); flex-shrink: 0; }
  .result-box {
    background: var(--accent2);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    margin-top: 8px;
    border: 1px solid var(--accent3);
  }
  .result-box small { display: block; font-size: 12px; color: var(--text2); font-weight: 400; margin-top: 4px; }

  /* ── 消費頁面 ── */
  .expense-total { text-align: center; padding: 12px 0 8px; }
  .total-krw { font-size: 32px; font-weight: 800; color: var(--accent); }
  .total-twd { font-size: 15px; color: var(--text2); margin-top: 4px; }
  .expense-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .expense-item:last-child { border-bottom: none; }
  .expense-name { font-size: 14px; font-weight: 600; }
  .expense-amt { text-align: right; }
  .expense-krw { font-size: 14px; font-weight: 700; color: var(--accent); }
  .expense-twd { font-size: 11px; color: var(--text2); }
  .cat-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .cat-餐飲 { background: #fff3e0; color: #e65100; }
  .cat-交通 { background: #ede7f6; color: #7c4dff; }
  .cat-購物 { background: #fce4ec; color: #e91e8c; }
  .cat-住宿 { background: #e8f5e9; color: #43a047; }
  .cat-其他 { background: #f3e5f5; color: #8e24aa; }
  .delete-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 15px;
    cursor: pointer;
    padding: 4px;
    opacity: 0.6;
  }

  /* ── 天氣頁面 ── */
  .weather-main {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 0 16px;
  }
  .weather-icon { font-size: 64px; line-height: 1; }
  .weather-temp { font-size: 48px; font-weight: 800; color: var(--text); }
  .weather-desc { font-size: 15px; color: var(--text2); margin-top: 4px; }
  .weather-detail {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .weather-detail-item {
    background: var(--accent2);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    border: 1px solid var(--accent3);
  }
  .detail-val { font-size: 20px; font-weight: 800; color: var(--accent); }
  .detail-label { font-size: 11px; color: var(--text2); margin-top: 3px; font-weight: 600; }
  .outfit-title { font-size: 11px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .outfit-main { font-size: 17px; font-weight: 700; margin-bottom: 8px; line-height: 1.6; color: var(--accent); }
  .outfit-tip { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .forecast-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .forecast-item {
    background: var(--accent2);
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
    min-width: 64px;
    border: 1px solid var(--accent3);
    flex-shrink: 0;
  }
  .forecast-time { font-size: 11px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
  .forecast-icon { font-size: 22px; margin-bottom: 4px; }
  .forecast-temp { font-size: 14px; font-weight: 700; color: var(--accent); }

  /* 分日統計 */
  .day-stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .day-stat:last-child { border-bottom: none; }
  .day-stat-day { color: var(--text2); font-size: 13px; }
  .day-stat-amt { font-weight: 700; color: var(--accent); }

  /* 空狀態 */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(60,20,40,0.85);
    color: #fff;
    padding: 10px 22px;
    border-radius: 22px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
    backdrop-filter: blur(6px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading */
  .loading { text-align: center; padding: 20px; color: var(--text2); font-size: 14px; }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 分類費用長條 */
  .cat-summary { display: flex; flex-direction: column; gap: 10px; }
  .cat-bar-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .cat-bar-label { width: 36px; flex-shrink: 0; font-size: 12px; font-weight: 700; }
  .cat-bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .cat-bar-fill { height: 100%; border-radius: 4px; }
  .cat-bar-amt { flex-shrink: 0; width: 72px; text-align: right; color: var(--text2); font-size: 12px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header" style="flex-direction:column;align-items:center;gap:2px;padding:12px 20px 10px;">
  <h1 style="font-size:16px;letter-spacing:0.5px;">✈️ 釜山六天五夜自由行</h1>
  <div class="subtitle" id="headerDate">載入中...</div>
</div>

<!-- Pages -->
<div id="page-schedule" class="page active">

  <!-- Banner 照片區 -->
  <div class="banner-wrap" onclick="document.getElementById('bannerInput').click()" id="bannerWrap">
    <div class="banner-placeholder" id="bannerPlaceholder">
      <div class="icon">📸</div>
      <div class="text">放上你的家庭照片</div>
      <div class="sub">點擊選擇照片</div>
    </div>
    <button class="banner-btn" id="bannerBtn" onclick="event.stopPropagation();document.getElementById('bannerInput').click()">
      📷 更換照片
    </button>
  </div>
  <input type="file" id="bannerInput" accept="image/*" onchange="uploadBanner(this)">

  <div class="page-inner">
  <div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px;">
    <div style="font-size:18px;font-weight:800;color:var(--text);">行程表</div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline btn-sm" onclick="resetSchedule()" style="font-size:11px;">重置行程</button>
      <button class="btn btn-sm" onclick="toggleAddForm()">＋ 新增</button>
    </div>
  </div>

  <div class="add-form" id="addForm">
    <div class="form-label">新增行程</div>
    <div class="form-row" style="margin-bottom:8px;">
      <div>
        <div class="form-label">第幾天</div>
        <select id="newDay"></select>
      </div>
      <div>
        <div class="form-label">時間</div>
        <input type="time" id="newTime" value="10:00">
      </div>
    </div>
    <div style="margin-bottom:8px;">
      <div class="form-label">地點名稱</div>
      <input type="text" id="newPlace" placeholder="例：海雲台海水浴場">
    </div>
    <div style="margin-bottom:8px;">
      <div class="form-label">備註（可略）</div>
      <input type="text" id="newNote" placeholder="例：退潮後最好玩">
    </div>
    <div style="margin-bottom:12px;">
      <div class="form-label">Naver Map 搜尋關鍵字（可略）</div>
      <input type="text" id="newMapQuery" placeholder="例：해운대 해수욕장">
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" style="flex:1;" onclick="addScheduleItem()">加入行程</button>
      <button class="btn btn-outline" style="flex:0;" onclick="toggleAddForm()">取消</button>
    </div>
  </div>

  <div id="scheduleList"></div>
  </div><!-- /page-inner -->
</div>

<div id="page-rate" class="page"><div class="page-inner">
  <div class="card">
    <div class="card-title">即時匯率</div>
    <div class="rate-display">
      <div class="rate-big" id="rateDisplay">載入中...</div>
      <div class="rate-sub">1 TWD = ? KRW</div>
      <div class="rate-updated" id="rateUpdated"></div>
    </div>
    <button class="btn" style="width:100%;margin-top:4px;" onclick="fetchRate()">重新抓取最新匯率</button>
  </div>

  <div class="card">
    <div class="card-title">快速換算</div>
    <div style="margin-bottom:12px;">
      <div class="form-label">輸入台幣（TWD）→ 換算韓元</div>
      <div class="converter-row">
        <input type="number" id="twdInput" placeholder="0" oninput="convertTWD()">
        <div class="arrow">→</div>
      </div>
      <div class="result-box" id="twdResult">
        — KRW
        <small>輸入台幣金額後自動換算</small>
      </div>
    </div>
    <hr style="border-color:var(--border);margin:16px 0;">
    <div>
      <div class="form-label">輸入韓元（KRW）→ 換算台幣</div>
      <div class="converter-row">
        <input type="number" id="krwInput" placeholder="0" oninput="convertKRW()">
        <div class="arrow">→</div>
      </div>
      <div class="result-box" id="krwResult">
        — TWD
        <small>輸入韓元金額後自動換算</small>
      </div>
    </div>
  </div>
</div></div>

<div id="page-expense" class="page"><div class="page-inner">
  <div class="card">
    <div class="card-title">旅程總花費</div>
    <div class="expense-total">

function uploadBanner(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const data = e.target.result;
    localStorage.setItem('busan_banner', data);
    renderBanner(data);
    showToast('照片已更新！');
  };
  reader.readAsDataURL(file);
}

function renderBanner(data) {
  const wrap = document.getElementById('bannerWrap');
  const placeholder = document.getElementById('bannerPlaceholder');
  if (data) {
    let img = wrap.querySelector('img');
    if (!img) {
      img = document.createElement('img');
      wrap.insertBefore(img, placeholder);
    }
    img.src = data;
    placeholder.style.display = 'none';
  } else {
    const img = wrap.querySelector('img');
    if (img) img.remove();
    placeholder.style.display = 'flex';
  }
}

const savedBanner = localStorage.getItem('busan_banner');

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function fmt(n) { return n.toLocaleString('zh-TW'); }
function fmtTWD(krw, rate) {
  if (!rate) return '—';
  return 'NT$ ' + Math.round(krw / rate).toLocaleString('zh-TW');
}

function getDayLabel(dayNum) {
  if (!TRIP_START) return `第 ${dayNum} 天`;
  const d = new Date(TRIP_START);
  d.setDate(d.getDate() + dayNum - 1);
  const mm = d.getMonth() + 1;
  const dd = d.getDate();
  const weekdays = ['日','一','二','三','四','五','六'];
  return `第 ${dayNum} 天（${mm}/${dd} 週${weekdays[d.getDay()]}）`;
}

  return /uber|搭車|計程|機場|taxi|前往.*車|出發前往/.test(text);
}

}

}

function saveItemEdit(day, idx) {
  const time = document.getElementById('editTime').value;
  const place = document.getElementById('editPlace').value.trim();
  const note = document.getElementById('editNote').value.trim();
  const map = document.getElementById('editMap').value.trim();
  if (!place) { showToast('請輸入地點名稱'); return; }
  scheduleData[day][idx] = { time, place, note, map };
  scheduleData[day].sort((a, b) => a.time.localeCompare(b.time));
  saveSchedule();
  closeEditModal();
  renderSchedule();
  showToast('行程已更新！');
}

function confirmReminder(timeStr, place) {
  const mins = window._remMins || 20;
  const [h, m] = timeStr.split(':').map(Number);
  const remH = h, remM = m - mins;
  const now = new Date();
  const target = new Date();
  target.setHours(remH, remM < 0 ? remM + 60 : remM, 0, 0);
  if (remM < 0) target.setHours(target.getHours() - 1);
  closeReminder();
  const diff = target - now;
  if (diff <= 0) {
    showToast('時間已過！記得現在就叫車 🚗', 4000);
    return;
  }
  const remLabel = `${String(remH).padStart(2,'0')}:${String(remM < 0 ? remM+60 : remM).padStart(2,'0')}`;
  showToast(`已設定！${remLabel} 會提醒你叫車 🚗`, 3500);
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  setTimeout(() => {
    showToast(`🚗 快去叫車！${place} 再 ${mins} 分鐘出發！`, 6000);
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('釜山出發提醒 🚗', { body: `${place} 再 ${mins} 分鐘出發，記得叫車！` });
    }
  }, diff);
}

function renderSchedule() {
  const list = document.getElementById('scheduleList');
  list.innerHTML = '';

  // 橫向天數分頁
  const tabsDiv = document.createElement('div');
  tabsDiv.className = 'day-tabs';
  for (let d = 1; d <= TRIP_DAYS; d++) {
    const date = new Date(TRIP_START);
    date.setDate(date.getDate() + d - 1);
    const mm = date.getMonth() + 1;
    const dd2 = date.getDate();
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (d === activeDayTab ? ' active' : '');
    tab.textContent = `Day ${d}・${mm}/${dd2}`;
    tab.onclick = () => switchDayTab(d);
    tabsDiv.appendChild(tab);
  }
  list.appendChild(tabsDiv);
  // 讓選中的 tab 自動捲入可見範圍
  const activeTab = tabsDiv.querySelector('.day-tab.active');
  if (activeTab) activeTab.scrollIntoView({ inline: 'start', block: 'nearest' });

  // 目前選中天的行程
  const items = scheduleData[activeDayTab] || [];
  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'color:var(--text2);font-size:13px;padding:24px 0;text-align:center;';
    empty.textContent = '這天尚無行程，點右上角＋新增';
    list.appendChild(empty);
    return;
  }

  items.forEach((item, idx) => {
    const noteLines = item.note ? item.note.split('・').map(s => s.trim()).filter(Boolean) : [];
    const detailHtml = noteLines.length > 1
      ? noteLines.map(l => `・${l}`).join('<br>')
      : (item.note || '');
    const safeMap = (item.map || '').replace(/'/g, "\\'");
    const safePlace = item.place.replace(/'/g, "\\'");
    const hasTaxi = needsTaxi(item);

    const div = document.createElement('div');
    div.className = 'schedule-item';
    div.innerHTML = `
      <div class="item-header" onclick="toggleItem(${activeDayTab},${idx})">
        <div class="item-time">${item.time}</div>
        <div class="item-body">
          <div class="item-place">${item.place}</div>
          ${item.note ? `<div class="item-note-preview">${item.note}</div>` : ''}
        </div>
        <div class="item-toggle" id="arrow-${activeDayTab}-${idx}">▼</div>
      </div>
      <div class="item-detail" id="detail-${activeDayTab}-${idx}">
        ${detailHtml ? `
        <div class="detail-block">
          <div class="detail-label">說明 / 注意事項</div>
          <div class="detail-text">${detailHtml}</div>
        </div>` : `<div style="color:var(--text2);font-size:13px;padding:4px 0 8px;">暫無詳細說明</div>`}
        <div class="item-actions">
          ${safeMap ? `<button class="btn-map" onclick="openNaverMap('${safeMap}')">🗺️ 地圖</button>` : ''}
          ${hasTaxi ? `<button class="btn-taxi" onclick="setTaxiReminder(${activeDayTab},${idx},'${item.time}','${safePlace}')">🚗 叫車提醒</button>` : ''}
          <button class="btn-edit" onclick="editItem(${activeDayTab},${idx})">✏️ 編輯</button>
          <button class="delete-btn" style="margin-left:auto;" onclick="deleteScheduleItem(${activeDayTab},${idx})">🗑️</button>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}
renderSchedule();

function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('open');
}

function addScheduleItem() {
  const day = parseInt(document.getElementById('newDay').value);
  const time = document.getElementById('newTime').value;
  const place = document.getElementById('newPlace').value.trim();
  const note = document.getElementById('newNote').value.trim();
  const mapQuery = document.getElementById('newMapQuery').value.trim();
  if (!place) { showToast('請輸入地點名稱'); return; }
  if (!scheduleData[day]) scheduleData[day] = [];
  scheduleData[day].push({ time, place, note, map: mapQuery });
  scheduleData[day].sort((a,b) => a.time.localeCompare(b.time));
  saveSchedule();
  renderSchedule();
  document.getElementById('newPlace').value = '';
  document.getElementById('newNote').value = '';
  document.getElementById('newMapQuery').value = '';
  toggleAddForm();
  showToast('行程已新增！');
}

function deleteScheduleItem(day, idx) {
  scheduleData[day].splice(idx, 1);
  saveSchedule();
  renderSchedule();
  showToast('已刪除');
}

function openNaverMap(query) {
  const encoded = encodeURIComponent(query);
  window.open(`https://map.naver.com/v5/search/${encoded}`, '_blank');
}

// ===== 匯率 =====
let currentRate = parseFloat(localStorage.getItem('busan_rate')) || null;
let rateTime = localStorage.getItem('busan_rate_time') || null;

async function fetchRate() {
  const now = Date.now();
  if (currentRate && rateTime && (now - parseInt(rateTime)) < 3600000) {
    displayRate(currentRate, parseInt(rateTime));
    return;
  }
  document.getElementById('rateDisplay').textContent = '載入中...';
  try {
    // 使用免費 API（不需要 key）
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/TWD');
    const data = await res.json();
    const rate = data.rates.KRW;
    currentRate = rate;
    rateTime = Date.now().toString();
    localStorage.setItem('busan_rate', rate.toString());
    localStorage.setItem('busan_rate_time', rateTime);
    displayRate(rate, Date.now());
  } catch(e) {
    // 備用 API
    try {
      const res2 = await fetch('https://open.er-api.com/v6/latest/TWD');
      const data2 = await res2.json();
      const rate = data2.rates.KRW;
      currentRate = rate;
      rateTime = Date.now().toString();
      localStorage.setItem('busan_rate', rate.toString());
      localStorage.setItem('busan_rate_time', rateTime);
      displayRate(rate, Date.now());
    } catch(e2) {
      document.getElementById('rateDisplay').textContent = currentRate ? currentRate.toFixed(2) : '無法取得';
      document.getElementById('rateUpdated').textContent = '網路錯誤，顯示快取匯率';
    }
  }
}

function displayRate(rate, ts) {
  document.getElementById('rateDisplay').textContent = rate.toFixed(2);
  const d = new Date(ts);
  document.getElementById('rateUpdated').textContent =
    `更新時間：${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  renderExpenses();
}

function convertTWD() {
  const twd = parseFloat(document.getElementById('twdInput').value) || 0;
  const el = document.getElementById('twdResult');
  if (!currentRate) { el.innerHTML = '請先抓取匯率<small>點上方「重新抓取」</small>'; return; }
  const krw = Math.round(twd * currentRate);
  el.innerHTML = `₩ ${fmt(krw)}<small>${twd} TWD = ${fmt(krw)} KRW</small>`;
}

function convertKRW() {
  const krw = parseFloat(document.getElementById('krwInput').value) || 0;
  const el = document.getElementById('krwResult');
  if (!currentRate) { el.innerHTML = '請先抓取匯率<small>點上方「重新抓取」</small>'; return; }
  const twd = Math.round(krw / currentRate);
  el.innerHTML = `NT$ ${fmt(twd)}<small>${fmt(krw)} KRW = ${twd} TWD</small>`;
}

fetchRate();

// ===== 消費記錄 =====
let expenses = JSON.parse(localStorage.getItem('busan_expenses') || '[]');

function saveExpenses() { localStorage.setItem('busan_expenses', JSON.stringify(expenses)); }

function addExpense() {
  const krw = parseInt(document.getElementById('expKrw').value);
  const name = document.getElementById('expName').value.trim();
  const cat = document.getElementById('expCat').value;
  const day = parseInt(document.getElementById('expDay').value);
  if (!krw || krw <= 0) { showToast('請輸入金額'); return; }
  if (!name) { showToast('請輸入消費名稱'); return; }
  expenses.push({ krw, name, cat, day, ts: Date.now() });
  saveExpenses();
  renderExpenses();
  document.getElementById('expKrw').value = '';
  document.getElementById('expName').value = '';
  showToast('記帳成功！');
}

function deleteExpense(idx) {
  expenses.splice(idx, 1);
  saveExpenses();
  renderExpenses();
  showToast('已刪除');
}

function renderExpenses() {
  const totalKrw = expenses.reduce((s, e) => s + e.krw, 0);
  document.getElementById('totalKrw').textContent = '₩ ' + fmt(totalKrw);
  document.getElementById('totalTwd').textContent = currentRate ? '≈ NT$ ' + fmt(Math.round(totalKrw / currentRate)) : '（匯率載入中）';

  // 明細（從新到舊）
  const listEl = document.getElementById('expenseList');
  if (expenses.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🧾</div><div class="empty-text">還沒有消費記錄</div></div>';
  } else {
    const sorted = [...expenses].map((e,i) => ({...e, origIdx: i})).sort((a,b) => b.ts - a.ts);
    listEl.innerHTML = sorted.map(e => `
      <div class="expense-item">
        <div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
            <span class="cat-tag cat-${e.cat}">${e.cat}</span>
            <span style="font-size:11px;color:var(--text2);">${getDayLabel(e.day).split('（')[0]}</span>
          </div>
          <div class="expense-name">${e.name}</div>
        </div>
        <div class="expense-amt">
          <div class="expense-krw">₩ ${fmt(e.krw)}</div>
          <div class="expense-twd">${fmtTWD(e.krw, currentRate)}</div>
        </div>
        <button class="delete-btn" onclick="deleteExpense(${e.origIdx})">🗑️</button>
      </div>
    `).join('');
  }

  // 各日統計
  const dayEl = document.getElementById('dayStats');
  const dayTotals = {};
  for (let i = 1; i <= TRIP_DAYS; i++) dayTotals[i] = 0;
  expenses.forEach(e => { dayTotals[e.day] = (dayTotals[e.day] || 0) + e.krw; });
  dayEl.innerHTML = Object.entries(dayTotals).filter(([,v]) => v > 0).map(([d,v]) => `
    <div class="day-stat">
      <div>${getDayLabel(parseInt(d))}</div>
      <div>
        <div class="day-stat-amt">₩ ${fmt(v)}</div>
        <div style="font-size:11px;color:var(--text2);text-align:right;">${fmtTWD(v, currentRate)}</div>
      </div>
    </div>
  `).join('') || '<div style="color:var(--text2);font-size:13px;">尚無資料</div>';

  // 分類統計
  const catEl = document.getElementById('catSummary');
  const cats = ['餐飲','交通','購物','住宿','其他'];
  const catColors = { '餐飲':'#facc15','交通':'#60a5fa','購物':'#e94560','住宿':'#4ade80','其他':'#a0a0b0' };
  const catTotals = {};
  cats.forEach(c => catTotals[c] = 0);
  expenses.forEach(e => { catTotals[e.cat] = (catTotals[e.cat] || 0) + e.krw; });
  const maxCat = Math.max(...Object.values(catTotals), 1);
  catEl.innerHTML = cats.map(c => `
    <div class="cat-bar-row">
      <div class="cat-bar-label" style="color:${catColors[c]};">${c}</div>
      <div class="cat-bar-track">
        <div class="cat-bar-fill" style="width:${Math.round(catTotals[c]/maxCat*100)}%;background:${catColors[c]};"></div>
      </div>
      <div class="cat-bar-amt">₩ ${fmt(catTotals[c])}</div>
    </div>
  `).join('');
}
renderExpenses();

// ===== 天氣 =====
// WMO 天氣代碼對應說明和圖示
function wmoInfo(code) {
  if (code === 0) return { desc: '晴天', icon: '☀️', rain: false };
  if (code <= 2) return { desc: '局部多雲', icon: '🌤️', rain: false };
  if (code === 3) return { desc: '陰天', icon: '☁️', rain: false };
  if (code <= 48) return { desc: '有霧', icon: '🌫️', rain: false };
  if (code <= 57) return { desc: '毛毛雨', icon: '🌦️', rain: true };
  if (code <= 67) return { desc: '有雨', icon: '🌧️', rain: true };
  if (code <= 77) return { desc: '下雪', icon: '❄️', rain: false };
  if (code <= 82) return { desc: '陣雨', icon: '🌧️', rain: true };
  if (code <= 86) return { desc: '雪陣雨', icon: '🌨️', rain: false };
  if (code >= 95) return { desc: '雷雨', icon: '⛈️', rain: true };
  return { desc: '多雲', icon: '🌥️', rain: false };
}

function getOutfitAdvice(temp, isRain, windKph) {
  let main = '';
  let tip = '';

  if (temp >= 28) {
    main = '🌞 輕薄短袖 + 短褲 / 裙子';
    tip = '天氣熱，建議防曬乳必備，戴帽子遮陽。';
  } else if (temp >= 23) {
    main = '🌤 短袖 + 薄外套（傍晚備用）';
    tip = '白天涼爽，早晚溫差可能大，帶件薄外套備用。';
  } else if (temp >= 18) {
    main = '🍃 長袖薄外套 + 長褲';
    tip = '氣溫舒適，長袖或薄夾克就很夠。';
  } else if (temp >= 13) {
    main = '🧥 厚外套 + 長褲';
    tip = '天氣涼，建議穿有點厚度的外套，圍巾可以帶著。';
  } else {
    main = '🧣 厚大衣 + 毛帽圍巾';
    tip = '天氣冷，注意保暖！帽子、圍巾、手套都用上。';
  }

  if (isRain) { main += '\n☂️ 記得帶傘！'; tip += '今天有雨，防水外套或雨衣更實用。'; }
  if (windKph > 25 && !isRain) { tip += '今天風大，建議穿擋風的外層。'; }

  return { main, tip };
}

async function fetchWeather() {
  const card = document.getElementById('weatherCard');
  card.innerHTML = '<div class="card-title">釜山即時天氣</div><div class="loading"><span class="spinner"></span>抓取天氣中...</div>';
  document.getElementById('outfitCard').style.display = 'none';
  document.getElementById('forecastCard').style.display = 'none';

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${BUSAN_LAT}&longitude=${BUSAN_LON}`
      + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m`
      + `&hourly=temperature_2m,weather_code&timezone=Asia%2FSeoul&forecast_days=1`;
    const res = await fetch(url);
    const data = await res.json();

    const cur = data.current;
    const temp = Math.round(cur.temperature_2m);
    const feels = Math.round(cur.apparent_temperature);
    const humidity = cur.relative_humidity_2m;
    const wind = cur.wind_speed_10m;
    const wmo = wmoInfo(cur.weather_code);

    card.innerHTML = `
      <div class="card-title">釜山即時天氣</div>
      <div class="weather-main">
        <div class="weather-icon">${wmo.icon}</div>
        <div>
          <div class="weather-temp">${temp}°</div>
          <div class="weather-desc">${wmo.desc}</div>
        </div>
      </div>
      <div class="weather-detail">
        <div class="weather-detail-item">
          <div class="detail-val">${feels}°</div>
          <div class="detail-label">體感</div>
        </div>
        <div class="weather-detail-item">
          <div class="detail-val">${humidity}%</div>
          <div class="detail-label">濕度</div>
        </div>
        <div class="weather-detail-item">
          <div class="detail-val">${wind}<span style="font-size:12px;">km/h</span></div>
          <div class="detail-label">風速</div>
        </div>
      </div>
    `;

    showOutfit(temp, wmo.rain, wind);

    // 今日逐時預報
    const hours = data.hourly.time;
    const temps = data.hourly.temperature_2m;
    const codes = data.hourly.weather_code;
    const now = new Date();
    const foreEl = document.getElementById('forecastRow');
    foreEl.innerHTML = hours.slice(0, 24).filter((_, i) => {
      const h = new Date(hours[i]).getHours();
      return h >= now.getHours() && h % 3 === 0;
    }).slice(0, 7).map((t, _, arr, i) => {
      const idx = hours.indexOf(t);
      const h = new Date(t).getHours();
      const label = h === 0 ? '午夜' : h < 12 ? `${h}AM` : h === 12 ? '中午' : `${h-12}PM`;
      return `
        <div class="forecast-item">
          <div class="forecast-time">${label}</div>
          <div class="forecast-icon">${wmoInfo(codes[idx]).icon}</div>
          <div class="forecast-temp">${Math.round(temps[idx])}°</div>
        </div>
      `;
    }).join('');
    document.getElementById('forecastCard').style.display = 'block';

  } catch(e) {
    card.innerHTML = `<div class="card-title">釜山即時天氣</div><div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">天氣資料抓取失敗<br><span style="font-size:12px;">請確認網路連線</span></div></div>`;
    showOutfit(20, false, 10);
  }
}

function showOutfit(temp, isRain, wind) {
  const { main, tip } = getOutfitAdvice(temp, isRain, wind);
  document.getElementById('outfitMain').textContent = main;
  document.getElementById('outfitTip').textContent = tip;
  document.getElementById('outfitCard').style.display = 'block';
}
