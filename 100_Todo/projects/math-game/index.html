<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌸 數學冒險！</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #FF85A1; --light-pink: #FFD6E7; --purple: #C9A0DC;
  --mint: #A8E6CF; --yellow: #FFD93D; --text: #5C3D5C;
  --shadow: 0 4px 20px rgba(200,100,150,0.18);
}
body {
  font-family: 'Segoe UI','微軟正黑體','蘋方-繁', Arial, sans-serif;
  background: linear-gradient(135deg, #FFD6E7 0%, #FFF0F5 55%, #EDE0F7 100%);
  min-height: 100vh; display: flex; justify-content: center; color: var(--text);
}
.container { width: 100%; max-width: 480px; min-height: 100vh; }
.screen {
  display: none; flex-direction: column; min-height: 100vh;
  padding: 20px 16px 32px; animation: fadeIn .35s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
@keyframes bounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes shake   { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes pop     { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
@keyframes appear  { 0%{transform:scale(.3) rotate(-12deg);opacity:0} 70%{transform:scale(1.1) rotate(4deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
@keyframes jumpUp  { 0%{transform:translateY(0) scale(1)} 35%{transform:translateY(-28px) scale(1.2)} 70%{transform:translateY(-10px) scale(1.08)} 100%{transform:translateY(0) scale(1)} }
@keyframes comboPop{ 0%{opacity:1;transform:translateX(-50%) scale(.4) translateY(0)} 40%{opacity:1;transform:translateX(-50%) scale(1.35) translateY(-18px)} 100%{opacity:0;transform:translateX(-50%) scale(1.1) translateY(-65px)} }
@keyframes xpFloat { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-72px)} }
@keyframes taskPop { 0%{opacity:0;transform:translateX(-50%) translateY(20px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1;transform:translateX(-50%) translateY(0)} 100%{opacity:0;transform:translateX(-50%) translateY(-16px)} }

/* ── PIXEL FX ── */
#fx-canvas { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999; }
.combo-pop {
  position:fixed;top:36%;left:50%;
  font-size:30px;font-weight:900;letter-spacing:2px;
  color:#FFD93D;text-shadow:3px 3px 0 #996600,-1px -1px 0 rgba(0,0,0,.25);
  z-index:998;pointer-events:none;animation:comboPop .88s forwards;
}
.xp-float {
  position:fixed;font-size:19px;font-weight:900;
  color:#FFD93D;text-shadow:2px 2px 0 #996600;
  pointer-events:none;z-index:997;animation:xpFloat 1.3s forwards;
}
.task-toast {
  position:fixed;top:17%;left:50%;
  background:#2E7D32;color:white;border-radius:50px;
  padding:12px 22px;font-size:14px;font-weight:800;
  z-index:996;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.22);
  animation:taskPop 2.6s forwards;white-space:nowrap;
}

/* ── TITLE ── */
#screen-title { align-items:center;justify-content:center;gap:16px;text-align:center; }
.title-char { font-size:88px;animation:bounce 2.2s infinite; }
.title-main { font-size:34px;font-weight:900;color:var(--pink);letter-spacing:5px;text-shadow:3px 3px 0 rgba(255,100,150,.18); }
.title-sub  { font-size:15px;color:#9B6B9B;letter-spacing:2px; }
.xp-badge   { background:white;border-radius:50px;padding:10px 26px;font-size:16px;font-weight:700;color:var(--pink);box-shadow:var(--shadow); }

.btn-main {
  background:linear-gradient(135deg,var(--pink),#FF6B9D);
  color:white;border:none;border-radius:50px;
  padding:18px 52px;font-size:20px;font-weight:800;
  cursor:pointer;letter-spacing:3px;
  box-shadow:0 6px 20px rgba(255,100,150,.38);transition:.15s;
}
.btn-main:active { transform:scale(.96); }
.btn-ghost {
  background:white;color:var(--text);
  border:3px solid #F0D0F0;border-radius:50px;
  padding:14px 28px;font-size:16px;font-weight:700;
  cursor:pointer;transition:.15s;
}
.btn-ghost:active { transform:scale(.96); }

/* ── DAILY TASKS ── */
.daily-card {
  background:white;border-radius:20px;padding:14px 18px;
  box-shadow:var(--shadow);width:100%;max-width:360px;
  border:3px solid var(--yellow);
}
.daily-title { font-size:13px;font-weight:900;color:#5C4000;margin-bottom:10px;letter-spacing:1px; }
.daily-task  { display:flex;align-items:center;gap:10px;padding:5px 0;font-size:13px;font-weight:600;border-bottom:1px solid #F5F0F5; }
.daily-task:last-child { border-bottom:none; }
.daily-task.done { color:#50C878; }
.daily-prog  { font-size:11px;color:#9B6B9B;margin-left:auto;white-space:nowrap; }

/* ── COMMON HEADER ── */
.hd { display:flex;align-items:center;gap:12px;margin-bottom:12px; }
.btn-back {
  background:white;border:none;border-radius:50%;
  width:46px;height:46px;font-size:20px;cursor:pointer;
  box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.15s;
}
.btn-back:active { transform:scale(.9); }
.hd-title { font-size:22px;font-weight:800; }

/* ── WORLDS ── */
#screen-worlds { gap:14px; }
.world-card {
  background:white;border-radius:24px;padding:18px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;
  border:3px solid transparent;cursor:pointer;transition:.18s;
}
.world-card:active { transform:scale(.97); }
.world-card.locked { opacity:.5;cursor:not-allowed;filter:grayscale(50%); }
.world-card.done   { border-color:var(--mint); }
.world-em  { font-size:60px;flex-shrink:0; }
.world-nm  { font-size:20px;font-weight:800;margin-bottom:4px; }
.world-ds  { font-size:13px;color:#9B6B9B;margin-bottom:8px; }
.world-dots{ display:flex;gap:6px; }
.dot       { width:16px;height:16px;border-radius:50%;background:#E8D5E8;border:2px solid #D0B0D0; }
.dot.lit   { background:var(--yellow);border-color:#FFB800; }
.lock-ic   { font-size:22px;color:#9B6B9B; }

/* ── LEVELS ── */
#screen-levels { gap:14px; }
.lv-card {
  background:white;border-radius:20px;padding:18px 20px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;
  border:3px solid transparent;cursor:pointer;transition:.18s;
}
.lv-card:active { transform:scale(.97); }
.lv-card.locked { opacity:.5;cursor:not-allowed; }
.lv-card.done   { border-color:var(--mint); }
.lv-num  { width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:white;flex-shrink:0; }
.lv-nm   { font-size:18px;font-weight:800;margin-bottom:3px; }
.lv-hint { font-size:13px;color:#9B6B9B; }
.stars   { display:flex;gap:3px;font-size:18px; }

/* ── GAME ── */
#screen-game { gap:14px; }
.g-header {
  display:flex;align-items:center;justify-content:space-between;
  background:white;border-radius:16px;padding:12px 16px;box-shadow:var(--shadow);
}
.g-prog  { font-size:15px;font-weight:700; }
.g-score { font-size:15px;font-weight:700;color:var(--pink); }
.timer-wrap  { background:#F0E0F0;border-radius:50px;height:12px;overflow:hidden; }
.timer-fill  { height:100%;border-radius:50px;transition:width 1s linear;background:linear-gradient(90deg,var(--pink),var(--purple)); }
.timer-fill.warn   { background:linear-gradient(90deg,#FFB800,#FF6B00); }
.timer-fill.danger { background:linear-gradient(90deg,#FF4444,#FF0000); }
.char-area  { display:flex;flex-direction:column;align-items:center;gap:10px; }
.game-char  { font-size:72px;transition:.25s; }
.game-char.ding { animation:jumpUp .5s; }
.game-char.oops { animation:shake .4s; }
.q-bubble { background:white;border-radius:24px;padding:24px 28px;box-shadow:var(--shadow);text-align:center;width:100%; }
.q-text   { font-size:38px;font-weight:900;letter-spacing:4px; }
.q-text.ch{ font-size:20px;letter-spacing:1px;line-height:1.6; }
.choices  { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
.choices.col1 { grid-template-columns:1fr; }
.choice {
  background:white;border:3px solid #F0D0F0;border-radius:20px;padding:20px 8px;
  font-size:28px;font-weight:900;color:var(--text);cursor:pointer;text-align:center;
  box-shadow:0 4px 12px rgba(200,100,150,.1);transition:.12s;
  min-height:72px;display:flex;align-items:center;justify-content:center;
}
.choice.ch-opt { font-size:15px;padding:14px 12px;min-height:54px;line-height:1.5; }
.choice:active  { transform:scale(.95); }
.choice.correct { background:var(--mint);border-color:#50C878;color:#1a5c30;animation:pop .3s; }
.choice.wrong   { background:#FFD6D6;border-color:#FF8888;color:#8B0000; }
.choice.reveal  { background:var(--mint);border-color:#50C878;color:#1a5c30; }
.choice:disabled{ cursor:default; }
.feedback      { text-align:center;font-size:22px;font-weight:800;min-height:34px; }
.feedback.ok   { color:#2E7D32; }
.feedback.no   { color:#C62828; }

/* ── STORY BUBBLE ── */
.story-bubble { background:#FFFBE6;border:2px solid var(--yellow);border-radius:18px;padding:14px 16px;box-shadow:0 3px 12px rgba(255,200,0,.15); }
.story-tag    { display:inline-block;background:var(--yellow);color:#5C4000;border-radius:50px;padding:3px 12px;font-size:12px;font-weight:800;margin-bottom:8px;letter-spacing:1px; }
.story-text   { font-size:15px;font-weight:600;color:var(--text);line-height:1.75; }

/* ── RESULT ── */
#screen-result { align-items:center;justify-content:center;gap:18px;text-align:center; }
.res-char  { font-size:86px;animation:appear .6s ease; }
.res-title { font-size:28px;font-weight:900;animation:appear .6s .1s both; }
.res-box   { background:white;border-radius:24px;padding:22px 44px;box-shadow:var(--shadow);animation:appear .6s .2s both; }
.res-big   { font-size:58px;font-weight:900;color:var(--pink); }
.res-sub   { font-size:15px;color:#9B6B9B; }
.xp-pill   { background:linear-gradient(135deg,var(--yellow),#FFB800);color:#5C4000;border-radius:50px;padding:10px 28px;font-size:18px;font-weight:700;animation:appear .6s .3s both; }
.ach-pill  { background:white;border:2px solid var(--yellow);border-radius:16px;padding:12px 20px;font-size:14px;font-weight:700;box-shadow:var(--shadow);animation:appear .6s .4s both; }
.res-btns  { display:flex;flex-direction:column;gap:12px;width:100%;max-width:290px;animation:appear .6s .45s both; }

/* ── ACHIEVEMENTS ── */
#screen-achievements { gap:14px; }
.ach-card { background:white;border-radius:20px;padding:14px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px; }
.ach-card.dim { opacity:.4;filter:grayscale(80%); }
.ach-ic   { font-size:44px;flex-shrink:0; }
.ach-nm   { font-size:16px;font-weight:800;margin-bottom:3px; }
.ach-ds   { font-size:12px;color:#9B6B9B; }
.ach-chk  { font-size:22px;margin-left:auto; }

/* ── LEADERBOARD ── */
#screen-leaderboard { gap:14px; }
.lb-row  { background:white;border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);margin-bottom:10px; }
.lb-rank { font-size:24px;width:36px;flex-shrink:0;text-align:center;font-weight:900; }
.lb-name { font-size:16px;font-weight:800;flex:1; }
.lb-xp   { font-size:15px;font-weight:700;color:var(--pink); }

/* ── NAME MODAL ── */
.modal-overlay { display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.52);z-index:1000;align-items:center;justify-content:center; }
.modal-overlay.active { display:flex; }
.modal-box    { background:white;border-radius:24px;padding:32px 24px;width:90%;max-width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.25);animation:appear .4s ease; }
.modal-title  { font-size:22px;font-weight:900;color:var(--pink);margin-bottom:8px; }
.modal-sub    { font-size:14px;color:#9B6B9B;margin-bottom:20px; }
.name-input   { width:100%;border:3px solid #F0D0F0;border-radius:16px;padding:14px 16px;font-size:22px;font-weight:700;text-align:center;color:var(--text);outline:none;margin-bottom:16px;font-family:inherit; }
.name-input:focus { border-color:var(--pink); }

/* ── REPORT MODAL ── */
.report-card {
  background:white;border-radius:24px;padding:28px 22px;
  width:92%;max-width:380px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.25);animation:appear .4s ease;
  max-height:88vh;overflow-y:auto;
}
.report-title { font-size:20px;font-weight:900;color:var(--pink);margin-bottom:4px; }
.report-date  { font-size:12px;color:#9B6B9B;margin-bottom:16px; }
.report-stat-row {
  display:flex;align-items:center;justify-content:space-between;
  background:#FFF5F8;border-radius:14px;padding:11px 16px;margin-bottom:7px;
}
.report-stat-label { font-size:14px;font-weight:700;color:#7B5B7B; }
.report-stat-value { font-size:17px;font-weight:900;color:var(--pink); }
.report-tasks-title { font-size:13px;font-weight:900;color:#5C4000;margin:14px 0 8px;text-align:left; }
.report-task-row {
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;padding:5px 0;
  border-bottom:1px solid #F5F0F5;text-align:left;
}
.report-task-row:last-child { border-bottom:none; }
.report-task-row.done { color:#50C878; }
.report-btns { display:flex;flex-direction:column;gap:10px;margin-top:18px; }
.report-status { font-size:13px;color:#9B6B9B;min-height:20px; }
#reportCopyArea { display:none; }
</style>
</head>
<body>
<canvas id="fx-canvas"></canvas>
<div class="container">

<!-- 名字 modal -->
<div class="modal-overlay" id="nameModal">
  <div class="modal-box">
    <div class="modal-title">👋 你好！</div>
    <div class="modal-sub">輸入你的名字，開始冒險吧！</div>
    <input class="name-input" id="nameInput" maxlength="6" placeholder="你的名字" />
    <button class="btn-main" onclick="saveName()" style="width:100%">出發！🚀</button>
  </div>
</div>

<!-- 今日報告 modal -->
<div class="modal-overlay" id="reportModal">
  <div class="report-card">
    <div class="report-title">📊 今日學習報告</div>
    <div class="report-date" id="reportDate"></div>
    <div id="reportStats"></div>
    <div class="report-tasks-title">📋 今日任務</div>
    <div id="reportTasks"></div>
    <div class="report-btns">
      <button class="btn-main" id="reportSendBtn" onclick="handleReportSend()">傳送到家長 LINE 📱</button>
      <div class="report-status" id="reportStatus"></div>
      <div id="reportCopyArea">
        <textarea id="reportCopyText" style="width:100%;border:2px solid #F0D0F0;border-radius:12px;padding:10px;font-size:12px;height:156px;resize:none;font-family:inherit;color:#5C3D5C;margin-top:4px" readonly></textarea>
        <button class="btn-ghost" id="reportCopyBtn" style="width:100%;margin-top:6px" onclick="copyReport()">複製文字 📋</button>
      </div>
      <button class="btn-ghost" onclick="closeReport()">關閉</button>
    </div>
  </div>
</div>

<!-- 標題畫面 -->
<div class="screen active" id="screen-title">
  <div class="title-char" id="titleChar">🐱</div>
  <div class="title-main">數學冒險</div>
  <div class="title-sub">跟著圓圓、暗暗、糖糖一起闖關！</div>
  <div class="xp-badge" id="titleXP">✨ 總經驗值：0 XP</div>
  <div class="daily-card" id="dailyCard">
    <div class="daily-title">📋 今日任務</div>
    <div id="dailyTaskList"></div>
  </div>
  <button class="btn-main" onclick="go('worlds')">開始冒險</button>
  <div style="display:flex;gap:10px;width:100%;max-width:320px">
    <button class="btn-ghost" style="flex:1" onclick="go('achievements')">🏆 成就</button>
    <button class="btn-ghost" style="flex:1" onclick="go('leaderboard')">👑 名人堂</button>
  </div>
  <button class="btn-ghost" style="width:100%;max-width:320px;border-color:#FFD93D;color:#5C4000;font-weight:900" onclick="showReport()">📊 今天玩完了</button>
</div>

<!-- 世界選擇 -->
<div class="screen" id="screen-worlds">
  <div class="hd">
    <button class="btn-back" onclick="go('title')">←</button>
    <div class="hd-title">選擇世界</div>
  </div>
  <div class="world-card" id="wc0" onclick="pickWorld(0)">
    <div class="world-em">🌸</div>
    <div style="flex:1">
      <div class="world-nm">加法世界</div>
      <div class="world-ds">100 以內加法，跟圓圓一起練習！</div>
      <div class="world-dots" id="wd0"><div class="dot" id="d00"></div><div class="dot" id="d01"></div><div class="dot" id="d02"></div></div>
    </div>
  </div>
  <div class="world-card" id="wc1" onclick="pickWorld(1)">
    <div class="world-em">🌙</div>
    <div style="flex:1">
      <div class="world-nm">減法世界</div>
      <div class="world-ds">100 以內減法，暗暗陪你挑戰！</div>
      <div class="world-dots" id="wd1"><div class="dot" id="d10"></div><div class="dot" id="d11"></div><div class="dot" id="d12"></div></div>
    </div>
    <div class="lock-ic" id="wl1">🔒</div>
  </div>
  <div class="world-card" id="wc2" onclick="pickWorld(2)">
    <div class="world-em">⭐</div>
    <div style="flex:1">
      <div class="world-nm">乘法世界</div>
      <div class="world-ds">2～5 的乘法，糖糖是你的好夥伴！</div>
      <div class="world-dots" id="wd2"><div class="dot" id="d20"></div><div class="dot" id="d21"></div><div class="dot" id="d22"></div></div>
    </div>
    <div class="lock-ic" id="wl2">🔒</div>
  </div>
  <div class="world-card" id="wc3" onclick="pickWorld(3)">
    <div class="world-em">🌈</div>
    <div style="flex:1">
      <div class="world-nm">進階挑戰</div>
      <div class="world-ds">兩步驟、反向計算、生活應用，閃閃陪你闖！</div>
      <div class="world-dots" id="wd3"><div class="dot" id="d30"></div><div class="dot" id="d31"></div><div class="dot" id="d32"></div></div>
    </div>
    <div class="lock-ic" id="wl3">🔒</div>
  </div>
  <div class="world-card" id="wc4" onclick="pickWorld(4)">
    <div class="world-em">📖</div>
    <div style="flex:1">
      <div class="world-nm">國語世界</div>
      <div class="world-ds">造詞、造句、短文閱讀，書書陪你學！</div>
      <div class="world-dots" id="wd4"><div class="dot" id="d40"></div><div class="dot" id="d41"></div><div class="dot" id="d42"></div></div>
    </div>
  </div>
</div>

<!-- 關卡選擇 -->
<div class="screen" id="screen-levels">
  <div class="hd">
    <button class="btn-back" onclick="go('worlds')">←</button>
    <div class="hd-title" id="lvTitle">關卡選擇</div>
  </div>
  <div id="lvCards"></div>
</div>

<!-- 遊戲進行 -->
<div class="screen" id="screen-game">
  <div class="g-header">
    <div class="g-prog" id="gProg">題目 1 / 10</div>
    <div class="g-score" id="gScore">答對 0 題</div>
  </div>
  <div class="timer-wrap"><div class="timer-fill" id="timerBar"></div></div>
  <div class="story-bubble" id="storyBubble" style="display:none">
    <div class="story-tag" id="storyTag">📖 應用題</div>
    <div class="story-text" id="storyText"></div>
  </div>
  <div class="char-area">
    <div class="game-char" id="gChar">🐱</div>
    <div class="q-bubble"><div class="q-text" id="qText">3 + 5 = ?</div></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
</div>

<!-- 結果畫面 -->
<div class="screen" id="screen-result">
  <div class="res-char" id="resChar">🎉</div>
  <div class="res-title" id="resTitle">過關了！</div>
  <div class="res-box">
    <div class="res-big" id="resBig">8 / 10</div>
    <div class="res-sub">答對題數</div>
  </div>
  <div class="xp-pill" id="resXP">+80 XP</div>

const canvas = document.getElementById('fx-canvas')

function spawnCoins(cx, cy) {
  const ems = ['⭐','🌟','✨','💫','🌸']
  for(let i=0;i<14;i++) {
    const a = Math.random()*Math.PI*2
    const spd = Math.random()*7+3
    PX.push({ x:cx, y:cy, vx:Math.cos(a)*spd*.85, vy:Math.sin(a)*spd-5,
      sz:Math.random()*13+9, em:ems[Math.floor(Math.random()*ems.length)],
      life:1, decay:Math.random()*.028+.018, grav:.28, type:'em' })
  }
}

function spawnFireworks() {
  const colors=['#FF85A1','#FFD93D','#C9A0DC','#A8E6CF','#FF6B35','#50C878','#5B8EFF','#FF44AA']
  for(let b=0;b<7;b++) {
    setTimeout(()=>{
      const bx=canvas.width*(.15+Math.random()*.7)
      const by=canvas.height*(.08+Math.random()*.42)
      const c1=colors[Math.floor(Math.random()*colors.length)]
      const c2=colors[Math.floor(Math.random()*colors.length)]
      // pixel squares burst
      for(let i=0;i<28;i++) {
        const a=(i/28)*Math.PI*2, spd=Math.random()*7+4, sz=Math.random()*7+3
        PX.push({ x:bx, y:by, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
          sz, color:Math.random()>.5?c1:c2,
          life:1, decay:Math.random()*.018+.011, grav:.11, type:'px' })
      }
      // emoji burst
      const ems2=['🎊','🎉','⭐','✨','💥']
      for(let j=0;j<5;j++) {
        PX.push({ x:bx, y:by, vx:(Math.random()-.5)*9, vy:Math.random()*-7-2,
          sz:22, em:ems2[Math.floor(Math.random()*ems2.length)],
          life:1, decay:.019, grav:.18, type:'em' })
      }
    }, b*340)
  }
}

function animFX() {
  ctx.clearRect(0,0,canvas.width,canvas.height)
  PX = PX.filter(p=>p.life>0)
  for(const p of PX) {
    ctx.save(); ctx.globalAlpha=p.life
    if(p.type==='em') {
      ctx.font=`${p.sz*1.9}px serif`
      ctx.fillText(p.em, p.x-p.sz*.9, p.y+p.sz*.9)
    } else {
      ctx.fillStyle=p.color
      const s=Math.ceil(p.sz)
      ctx.fillRect(Math.round(p.x-s/2), Math.round(p.y-s/2), s, s)
    }
    ctx.restore()
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav; p.vx*=.98; p.life-=p.decay
  }
  requestAnimationFrame(animFX)
}
animFX()

// ── 問題產生 ──────────────────────────────────────────────────
function genQ(world, level, diff) {
  if(world===4) {
    if(diff==='zaoci') return shuffle([...CHINESE_Q.zaoci]).slice(0,10).map(q=>({type:'ch',text:q.text,ans:q.ans,opts:shuffle([...q.opts])}))
    if(diff==='zaoju') return shuffle([...CHINESE_Q.zaoju]).slice(0,10).map(q=>({type:'ch',text:q.text,ans:q.ans,opts:shuffle([...q.opts])}))
    if(diff==='duanwen') {
      const qs=[]
      for(const p of shuffle([...CHINESE_Q.duanwen])) {
        for(const q of p.qs) {
          qs.push({type:'ch',story:p.story,text:q.text,ans:q.ans,opts:shuffle([...q.opts])})
          if(qs.length>=10) break
        }
        if(qs.length>=10) break
      }
      return qs
    }
  }
  if(world===3) {
    const bank=STORY_Q[3]&&STORY_Q[3][diff]?shuffle([...STORY_Q[3][diff]]):[]
    return bank.slice(0,10).map(sq=>{ const q={type:'story',story:sq.story,text:'答案是多少？',ans:sq.ans}; q.opts=makeOpts(q.ans); return q })
  }
  const storyCount=diff==='hard'?4:diff==='mid'?2:0
  const bank=STORY_Q[world]&&STORY_Q[world][diff]?shuffle([...STORY_Q[world][diff]]):[]
  const stories=bank.slice(0,Math.min(storyCount,bank.length))
  const slots=new Set()
  while(slots.size<stories.length) slots.add(Math.floor(Math.random()*10))
  let si=0; const qs=[]
  for(let i=0;i<10;i++) {
    let q
    if(slots.has(i)&&si<stories.length) { const sq=stories[si++]; q={type:'story',story:sq.story,text:'答案是多少？',ans:sq.ans} }
    else if(world===0) q=addQ(diff)
    else if(world===1) q=subQ(diff)
    else q=mulQ(level)
    q.opts=makeOpts(q.ans); qs.push(q)
  }
  return qs
}

function addQ(diff) {
  let a,b
  if(diff==='easy'){a=r(1,5);b=r(1,5-a+1)||1}
  else if(diff==='mid'){a=r(5,29);b=r(1,20)}
  else{a=r(10,59);b=r(10,100-a)}
  return {text:`${a} + ${b} = ?`,ans:a+b}
}
function subQ(diff) {
  let a,b
  if(diff==='easy'){b=r(1,4);a=r(b+1,9)}
  else if(diff==='mid'){b=r(1,19);a=r(b+1,50)}
  else{b=r(10,49);a=r(b+1,99)}
  return {text:`${a} - ${b} = ?`,ans:a-b}
}
function mulQ(level) {
  const pools=[[2,3],[4,5],[2,3,4,5]]
  const a=pools[level][Math.floor(Math.random()*pools[level].length)]
  const b=r(1,9)
  return {text:`${a} × ${b} = ?`,ans:a*b}
}
function makeOpts(correct) {
  const set=new Set([correct]); let tries=0
  while(set.size<4&&tries<60){tries++;const d=r(-8,8)||1;const w=correct+d;if(w>0&&w!==correct)set.add(w)}
  let fill=1; while(set.size<4){if(!set.has(correct+fill))set.add(correct+fill);fill++}
  return shuffle([...set])
}
function r(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function renderQ() {
  const q=G.qs[G.qi]
  const isCh=q.type==='ch'
  document.getElementById('gProg').textContent=`題目 ${G.qi+1} / 10`
  document.getElementById('gScore').textContent=`答對 ${G.score} 題`
  document.getElementById('gChar').textContent=WORLDS[S.curW].char

  const bubble=document.getElementById('storyBubble')
  if(q.story) {
    document.getElementById('storyText').textContent=q.story
    document.getElementById('storyTag').textContent=q.type==='ch'?'📖 短文閱讀':'📖 應用題'
    bubble.style.display='block'
  } else { bubble.style.display='none' }

  const qEl=document.getElementById('qText')
  qEl.textContent=q.text
  qEl.className=isCh?'q-text ch':'q-text'

  const con=document.getElementById('choices')
  con.innerHTML=''
  const longOpts=isCh&&q.opts.some(o=>String(o).length>5)
  con.className=longOpts?'choices col1':'choices'

  q.opts.forEach(v=>{
    const btn=document.createElement('button')
    btn.className='choice'+(isCh?' ch-opt':'')
    btn.textContent=v; btn.dataset.v=String(v)
    btn.onclick=()=>answer(v,q.ans)
    con.appendChild(btn)
  })

  document.getElementById('feedback').textContent=''
  document.getElementById('feedback').className='feedback'
  G.done=false; tickTimer()
}

function tickTimer() {
  clearInterval(G.timer)
  const bar=document.getElementById('timerBar')
  if(S.curW===3||S.curW===4){bar.style.display='none';return}
  bar.style.display='block'; G.timeLeft=15
  bar.style.width='100%'; bar.className='timer-fill'
  G.timer=setInterval(()=>{
    G.timeLeft--
    bar.style.width=(G.timeLeft/15*100)+'%'
    if(G.timeLeft<=5) bar.className='timer-fill danger'
    else if(G.timeLeft<=8) bar.className='timer-fill warn'
    if(G.timeLeft<=0){clearInterval(G.timer);if(!G.done)timeout()}
  },1000)
}

function timeout() {
  G.done=true; G.combo=0
  if(S.dailyLog) S.dailyLog.wrong++
  const ans=G.qs[G.qi].ans
  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true
    if(String(b.dataset.v)===String(ans)) b.classList.add('reveal')
  })
  setFB(`答案是「${ans}」，繼續加油！`,'no')
  document.getElementById('gChar').className='game-char oops'
  setTimeout(next,2000)
}

function answer(chosen,correct) {
  if(G.done) return
  G.done=true; clearInterval(G.timer)
  const t=15-G.timeLeft, ok=String(chosen)===String(correct)
  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true
    if(String(b.dataset.v)===String(correct)) b.classList.add('correct')
    else if(String(b.dataset.v)===String(chosen)&&!ok) b.classList.add('wrong')
  })
  if(ok) {
    G.score++; G.combo++
    if(S.dailyLog) S.dailyLog.correct++
    document.getElementById('gChar').className='game-char ding'
    setFB(PRAISE[Math.floor(Math.random()*PRAISE.length)],'ok')
    if(t<=5&&S.curW<4) unlock('speed')
    unlock('first')
    const charEl=document.getElementById('gChar')
    const rect=charEl.getBoundingClientRect()
    spawnCoins(rect.left+rect.width/2, rect.top+rect.height/2)
    showCombo(G.combo)
    showXPFloat(10, charEl)
    if(G.combo>=5) unlock('combo5')
    trackTask('correct')
    if(G.combo===3) trackTask('cb3')
    if(G.combo===5) trackTask('cb5')
  } else {
    G.combo=0
    if(S.dailyLog) S.dailyLog.wrong++
    document.getElementById('gChar').className='game-char oops'
    setFB(MISS[Math.floor(Math.random()*MISS.length)],'no')
  }
  setTimeout(next,1500)
}

function setFB(msg,cls) {
  const el=document.getElementById('feedback')
  el.textContent=msg; el.className='feedback '+cls
}

function next() { G.qi++; if(G.qi>=10) endGame(); else renderQ() }

function endGame() {
  const wi=S.curW,li=S.curL,sc=G.score
  const prev=S.worlds[wi].lv[li]
  if(prev===null||sc>prev) S.worlds[wi].lv[li]=sc
  const xp=sc*10+(sc===10?50:0); S.xp+=xp
  if(S.dailyLog){S.dailyLog.levels++;S.dailyLog.xpEarned+=xp}
  if(sc===10) unlock('perfect')
  if(sc>=7) spawnFireworks()
  if(worldDone(0)) unlock('w0')
  if(worldDone(1)) unlock('w1')
  if(worldDone(2)) unlock('w2')
  if(worldDone(3)) unlock('w3')
  if(worldDone(4)) unlock('w4')
  if([0,1,2,3,4].every(i=>S.ach.includes('w'+i))) unlock('champ')
  if(S.xp>=100) unlock('xp100')
  if(S.xp>=500) unlock('xp500')
  trackTask('level')
  if(sc===10) trackTask('perfect')
  updateLeaderboard(); save()

  document.getElementById('resChar').textContent=sc===10?'🥳':sc>=7?'🎉':'💪'
  document.getElementById('resTitle').textContent=sc===10?'完美滿分！！！':sc>=7?'過關了！太棒了！':'再試一次！你可以的！'
  document.getElementById('resTitle').style.color=sc>=7?'#2E7D32':'#C62828'
  document.getElementById('resBig').textContent=`${sc} / 10`
  document.getElementById('resXP').textContent=`+${xp} XP 經驗值`

  const achEl=document.getElementById('resAch')
  const a=G.newAch.length?ACH_DEF.find(x=>x.id===G.newAch[0]):null
  if(a){achEl.textContent=`🏆 新成就：${a.ic} ${a.nm}`;achEl.style.display='block'}
  else achEl.style.display='none'

  const btn=document.getElementById('resMainBtn')
  if(sc>=7&&li<2){btn.textContent='繼續下一關 →';btn.onclick=()=>startGame(wi,li+1)}
  else if(sc>=7&&li===2&&wi<4){btn.textContent=`前往 ${WORLDS[wi+1].name} →`;btn.onclick=()=>{S.curW=wi+1;openLevels(wi+1)}}
  else if(sc>=7&&li===2&&wi===4){btn.textContent='🎊 恭喜！全部世界通關！';btn.onclick=()=>go('title')}
  else{btn.textContent='重新挑戰 ↺';btn.onclick=()=>startGame(wi,li)}
  go('result')
}

function unlock(id) { if(!S.ach.includes(id)){S.ach.push(id);G.newAch.push(id)} }

function renderAch() {
  const con=document.getElementById('achList'); con.innerHTML=''
  ACH_DEF.forEach(a=>{
    const got=S.ach.includes(a.id)
    const card=document.createElement('div')
    card.className='ach-card'+(got?'':' dim')
    card.style.marginBottom='10px'
    card.innerHTML=`<div class="ach-ic">${a.ic}</div><div><div class="ach-nm">${a.nm}</div><div class="ach-ds">${a.ds}</div></div><div class="ach-chk">${got?'✅':''}</div>`
    con.appendChild(card)
  })
}

// ── 家長 LINE 報告 ────────────────────────────────────────────
function buildReportText() {
  const name = S.playerName||'小孩'
  const log  = S.dailyLog||{}
  const mins = Math.max(1,Math.round((Date.now()-SESSION_START)/60000))
  const tasks= S.daily?S.daily.tasks:[]
  const tLines= tasks.length
    ? tasks.map(t=>`  ${t.done?'✅':'⬜'} ${t.text} (${Math.min(t.progress||0,t.goal)}/${t.goal})`).join('\n')
    : '  (今天還沒有任務)'
  return `📊 ${name} 今日學習報告
━━━━━━━━━━━━━
🕐 學習時間：${mins} 分鐘
✅ 答對：${log.correct||0} 題
❌ 答錯：${log.wrong||0} 題
⭐ 今日獲得：+${log.xpEarned||0} XP
📚 完成關卡：${log.levels||0} 關

📋 今日任務
${tLines}
━━━━━━━━━━━
加油！繼續保持！💪`
}

function buildFlexMessage() {
  const name    = S.playerName||'小孩'
  const log     = S.dailyLog||{}
  const mins    = Math.max(1,Math.round((Date.now()-SESSION_START)/60000))
  const correct = log.correct||0
  const wrong   = log.wrong||0
  const levels  = log.levels||0
  const xp      = log.xpEarned||0
  const tasks   = S.daily?S.daily.tasks:[]

  const total    = correct+wrong
  const accuracy = total>0 ? Math.round(correct/total*100) : 0
  const encourage= total===0 ? '今天剛開始！明天一起努力！🎮'
    : accuracy>=80 ? '超棒的！今天表現真的很好！🌟'
    : accuracy>=60 ? '繼續加油！每天進步一點點！💪'
    : '沒關係！練習讓人進步！加油！✨'
  const altText = `📊 ${name} 今日學習報告 | 答對 ${correct} 題・學習 ${mins} 分鐘`

  function stat(icon, label, value, color) {
    return {
      type:'box',layout:'horizontal',margin:'sm',
      contents:[
        {type:'text',text:icon+' '+label,size:'sm',color:'#9B6B9B',flex:5},
        {type:'text',text:value,size:'sm',color:color||'#5C3D5C',flex:3,align:'end',weight:'bold'}
      ]
    }
  }

  function taskRow(t) {
    const prog = Math.min(t.progress||0, t.goal)
    const pct  = Math.round(prog/t.goal*100)
    const barColor = t.done ? '#50C878' : '#FFD93D'
    const inner = []
    if(pct>0)     inner.push({type:'box',layout:'vertical',flex:pct,backgroundColor:barColor,cornerRadius:'3px',contents:[{type:'filler'}]})
    if(pct<100)   inner.push({type:'box',layout:'vertical',flex:100-pct,contents:[{type:'filler'}]})
    if(!inner.length) inner.push({type:'filler'})
    return {
      type:'box',layout:'vertical',margin:'sm',
      contents:[
        {type:'box',layout:'horizontal',contents:[
          {type:'text',text:(t.done?'✅':'⬜')+' '+t.text,size:'xs',flex:1,
           color:t.done?'#2E7D32':'#5C3D5C',wrap:true},
          {type:'text',text:t.done?'完成！':`${prog}/${t.goal}`,
           size:'xs',align:'end',color:t.done?'#50C878':'#9B6B9B'}
        ]},
        {type:'box',layout:'horizontal',height:'6px',
         backgroundColor:'#F0E0F0',cornerRadius:'3px',margin:'xs',
         contents:inner}
      ]
    }
  }

  const body = [
    stat('🕐','學習時間',  mins+' 分鐘'),
    stat('✅','答對題數',   correct+' 題',  '#2E7D32'),
    stat('❌','答錯題數',   wrong+' 題',    wrong>0?'#C62828':'#9B6B9B'),
    stat('⭐','今日 XP',   '+'+xp+' XP',   '#FF8C00'),
    stat('📚','完成關卡',  levels+' 關',    '#1565C0'),
    {type:'separator',margin:'lg',color:'#FFD6E7'},
    {type:'text',text:'📋 今日任務',weight:'bold',size:'sm',color:'#5C4000',margin:'lg'}
  ]
  if(tasks.length) tasks.forEach(t=>body.push(taskRow(t)))
  else body.push({type:'text',text:'今天還沒有任務記錄',size:'xs',color:'#9B6B9B',align:'center',margin:'sm'})

  const contents = {
    type:'bubble',
    header:{
      type:'box',layout:'vertical',backgroundColor:'#FF85A1',paddingAll:'18px',
      contents:[
        {type:'text',text:'📊 今日學習報告',color:'#FFFFFF',weight:'bold',size:'xl',align:'center'},
        {type:'text',text:today()+' · '+name,color:'#FFD6E7',size:'sm',align:'center',margin:'sm'}
      ]
    },
    body:{type:'box',layout:'vertical',paddingAll:'16px',contents:body},
    footer:{
      type:'box',layout:'vertical',backgroundColor:'#FFF5F8',paddingAll:'14px',
      contents:[{type:'text',text:encourage,align:'center',weight:'bold',color:'#FF85A1',size:'sm',wrap:true}]
    },
    styles:{footer:{separator:true,separatorColor:'#FFD6E7'}}
  }
  return {altText, contents}
}

function showReport() {
  const log  = S.dailyLog||{}
  const mins = Math.max(1,Math.round((Date.now()-SESSION_START)/60000))
  document.getElementById('reportDate').textContent=today()+' · '+(S.playerName||'玩家')
  document.getElementById('reportStats').innerHTML=[
    {l:'🕐 學習時間',v:mins+' 分鐘'},
    {l:'✅ 答對題數',v:(log.correct||0)+' 題'},
    {l:'❌ 答錯題數',v:(log.wrong||0)+' 題'},
    {l:'⭐ 今日 XP',  v:'+'+(log.xpEarned||0)+' XP'},
    {l:'📚 完成關卡',v:(log.levels||0)+' 關'},
  ].map(s=>`<div class="report-stat-row"><span class="report-stat-label">${s.l}</span><span class="report-stat-value">${s.v}</span></div>`).join('')
  const tasks=S.daily?S.daily.tasks:[]
  document.getElementById('reportTasks').innerHTML=tasks.length
    ? tasks.map(t=>`<div class="report-task-row${t.done?' done':''}"><span>${t.done?'✅':'⬜'}</span><span style="flex:1">${t.text}</span><span style="color:#9B6B9B;font-size:11px">${Math.min(t.progress||0,t.goal)}/${t.goal}</span></div>`).join('')
    : '<div style="color:#9B6B9B;font-size:13px;padding:8px 0">今天還沒有任務記錄</div>'
  const btn=document.getElementById('reportSendBtn')
  const statusEl=document.getElementById('reportStatus')
  document.getElementById('reportCopyArea').style.display='none'
  if(log.lineSent){
    btn.textContent='✅ 今天已傳給家長了'; btn.disabled=true
    statusEl.style.color='#2E7D32'; statusEl.textContent='家長已收到今日報告！'
  } else {
    btn.textContent='傳送到家長 LINE 📱'; btn.disabled=false
    statusEl.textContent=''
  }
  document.getElementById('reportModal').classList.add('active')
}

function closeReport() { document.getElementById('reportModal').classList.remove('active') }

async function handleReportSend() {
  const btn=document.getElementById('reportSendBtn')
  const statusEl=document.getElementById('reportStatus')
  btn.disabled=true; btn.textContent='傳送中...'
  statusEl.textContent=''
  const flexMsg      = buildFlexMessage()
  const fallbackText = buildReportText()

  // 優先透過本地伺服器中轉（game-server.py），避免 CORS 問題
  try {
    const res=await fetch('/api/send-line',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({flex:flexMsg})
    })
    if(res.ok){
      const data=await res.json()
      if(data.ok){
        S.dailyLog.lineSent=true; save()
        btn.textContent='✅ 已傳給家長！'
        statusEl.style.color='#2E7D32'; statusEl.textContent='家長的 LINE 已收到今日報告！'
        return
      }
      throw new Error(data.error||'伺服器回傳錯誤')
    }
    throw new Error('HTTP '+res.status)
  } catch(e) {
    // 伺服器未啟動或失敗 → 顯示複製備援
    btn.disabled=false; btn.textContent='傳送到家長 LINE 📱'
    const hint = e.message.includes('fetch') ? '請用「啟動遊戲.command」開啟遊戲以啟用自動傳送' : e.message
    statusEl.style.color='#C62828'; statusEl.textContent='無法傳送：'+hint
    const ca=document.getElementById('reportCopyArea')
    ca.style.display='block'
    document.getElementById('reportCopyText').value=fallbackText
  }
}

function copyReport() {
  const text=document.getElementById('reportCopyText').value
  const btn=document.getElementById('reportCopyBtn')
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✅ 已複製！開啟 LINE 貼上即可'
    setTimeout(()=>btn.textContent='複製文字 📋',3000)
  }).catch(()=>{
    document.getElementById('reportCopyText').select()
    document.execCommand('copy')
    btn.textContent='✅ 已複製！'
    setTimeout(()=>btn.textContent='複製文字 📋',3000)
  })
}

checkPlayerName()
