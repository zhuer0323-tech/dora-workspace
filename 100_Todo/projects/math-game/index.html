<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌸 數學冒險！</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink: #FF85A1;
  --light-pink: #FFD6E7;
  --purple: #C9A0DC;
  --mint: #A8E6CF;
  --yellow: #FFD93D;
  --text: #5C3D5C;
  --shadow: 0 4px 20px rgba(200,100,150,0.18);
}

body {
  font-family: 'Segoe UI','微軟正黑體','蘋方-繁', Arial, sans-serif;
  background: linear-gradient(135deg, #FFD6E7 0%, #FFF0F5 55%, #EDE0F7 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  color: var(--text);
}

.container { width: 100%; max-width: 480px; min-height: 100vh; }

.screen {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  padding: 20px 16px 32px;
  animation: fadeIn .35s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes shake  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes pop    { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
@keyframes appear { 0%{transform:scale(.3) rotate(-12deg);opacity:0} 70%{transform:scale(1.1) rotate(4deg)} 100%{transform:scale(1) rotate(0);opacity:1} }

/* ── TITLE ── */
#screen-title {
  align-items: center;
  justify-content: center;
  gap: 22px;
  text-align: center;
}
.title-char { font-size: 88px; animation: bounce 2.2s infinite; }
.title-main { font-size: 34px; font-weight: 900; color: var(--pink); letter-spacing: 5px; text-shadow: 3px 3px 0 rgba(255,100,150,.18); }
.title-sub  { font-size: 15px; color: #9B6B9B; letter-spacing: 2px; }
.xp-badge   { background: white; border-radius: 50px; padding: 10px 26px; font-size: 16px; font-weight: 700; color: var(--pink); box-shadow: var(--shadow); }

.btn-main {
  background: linear-gradient(135deg, var(--pink), #FF6B9D);
  color: white; border: none; border-radius: 50px;
  padding: 18px 52px; font-size: 20px; font-weight: 800;
  cursor: pointer; letter-spacing: 3px;
  box-shadow: 0 6px 20px rgba(255,100,150,.38);
  transition: .15s;
}
.btn-main:active { transform: scale(.96); box-shadow: 0 2px 10px rgba(255,100,150,.25); }

.btn-ghost {
  background: white; color: var(--text);
  border: 3px solid #F0D0F0; border-radius: 50px;
  padding: 14px 28px; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: .15s;
}
.btn-ghost:active { transform: scale(.96); }

/* ── COMMON HEADER ── */
.hd { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.btn-back {
  background: white; border: none; border-radius: 50%;
  width: 46px; height: 46px; font-size: 20px;
  cursor: pointer; box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: .15s;
}
.btn-back:active { transform: scale(.9); }
.hd-title { font-size: 22px; font-weight: 800; }

/* ── WORLDS ── */
#screen-worlds { gap: 14px; }

.world-card {
  background: white; border-radius: 24px;
  padding: 18px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 14px;
  border: 3px solid transparent; cursor: pointer; transition: .18s;
}
.world-card:active { transform: scale(.97); }
.world-card.locked  { opacity: .5; cursor: not-allowed; filter: grayscale(50%); }
.world-card.done    { border-color: var(--mint); }

.world-em { font-size: 60px; flex-shrink: 0; }
.world-nm { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.world-ds { font-size: 13px; color: #9B6B9B; margin-bottom: 8px; }
.world-dots { display: flex; gap: 6px; }
.dot { width: 16px; height: 16px; border-radius: 50%; background: #E8D5E8; border: 2px solid #D0B0D0; }
.dot.lit { background: var(--yellow); border-color: #FFB800; }
.lock-ic { font-size: 22px; color: #9B6B9B; }

/* ── LEVELS ── */
#screen-levels { gap: 14px; }

.lv-card {
  background: white; border-radius: 20px;
  padding: 18px 20px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 14px;
  border: 3px solid transparent; cursor: pointer; transition: .18s;
}
.lv-card:active { transform: scale(.97); }
.lv-card.locked { opacity: .5; cursor: not-allowed; }
.lv-card.done   { border-color: var(--mint); }

.lv-num {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; color: white; flex-shrink: 0;
}
.lv-nm { font-size: 18px; font-weight: 800; margin-bottom: 3px; }
.lv-hint { font-size: 13px; color: #9B6B9B; }
.stars { display: flex; gap: 3px; font-size: 18px; }

/* ── GAME ── */
#screen-game { gap: 14px; }

.g-header {
  display: flex; align-items: center; justify-content: space-between;
  background: white; border-radius: 16px; padding: 12px 16px;
  box-shadow: var(--shadow);
}
.g-prog { font-size: 15px; font-weight: 700; }
.g-score { font-size: 15px; font-weight: 700; color: var(--pink); }

.timer-wrap { background: #F0E0F0; border-radius: 50px; height: 12px; overflow: hidden; }
.timer-fill { height: 100%; border-radius: 50px; transition: width 1s linear; background: linear-gradient(90deg, var(--pink), var(--purple)); }
.timer-fill.warn   { background: linear-gradient(90deg,#FFB800,#FF6B00); }
.timer-fill.danger { background: linear-gradient(90deg,#FF4444,#FF0000); }

.char-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.game-char  { font-size: 72px; transition: .25s; }
.game-char.ding  { animation: bounce .5s; }
.game-char.oops  { animation: shake .4s; }

.q-bubble {
  background: white; border-radius: 24px;
  padding: 24px 28px; box-shadow: var(--shadow);
  text-align: center; width: 100%;
}
.q-text { font-size: 38px; font-weight: 900; letter-spacing: 4px; }

.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.choice {
  background: white; border: 3px solid #F0D0F0;
  border-radius: 20px; padding: 20px 8px;
  font-size: 28px; font-weight: 900; color: var(--text);
  cursor: pointer; text-align: center;
  box-shadow: 0 4px 12px rgba(200,100,150,.1); transition: .12s;
  min-height: 72px; display: flex; align-items: center; justify-content: center;
}
.choice:active  { transform: scale(.95); }
.choice.correct { background: var(--mint); border-color: #50C878; color: #1a5c30; animation: pop .3s; }
.choice.wrong   { background: #FFD6D6; border-color: #FF8888; color: #8B0000; }
.choice.reveal  { background: var(--mint); border-color: #50C878; color: #1a5c30; }
.choice:disabled { cursor: default; }

.feedback { text-align: center; font-size: 22px; font-weight: 800; min-height: 34px; }
.feedback.ok  { color: #2E7D32; }
.feedback.no  { color: #C62828; }

/* ── STORY BUBBLE ── */
.story-bubble {
  background: #FFFBE6;
  border: 2px solid var(--yellow);
  border-radius: 18px;
  padding: 14px 16px;
  box-shadow: 0 3px 12px rgba(255,200,0,.15);
}
.story-tag {
  display: inline-block;
  background: var(--yellow);
  color: #5C4000;
  border-radius: 50px;
  padding: 3px 12px;
  font-size: 12px;
  font-weight: 800;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.story-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.75;
}

/* ── RESULT ── */
#screen-result {
  align-items: center; justify-content: center;
  gap: 18px; text-align: center;
}
.res-char  { font-size: 86px; animation: appear .6s ease; }
.res-title { font-size: 28px; font-weight: 900; animation: appear .6s .1s both; }

.res-box {
  background: white; border-radius: 24px;
  padding: 22px 44px; box-shadow: var(--shadow);
  animation: appear .6s .2s both;
}
.res-big { font-size: 58px; font-weight: 900; color: var(--pink); }
.res-sub { font-size: 15px; color: #9B6B9B; }

.xp-pill {
  background: linear-gradient(135deg, var(--yellow), #FFB800);
  color: #5C4000; border-radius: 50px;
  padding: 10px 28px; font-size: 18px; font-weight: 700;
  animation: appear .6s .3s both;
}

.ach-pill {
  background: white; border: 2px solid var(--yellow);
  border-radius: 16px; padding: 12px 20px;
  font-size: 14px; font-weight: 700;
  box-shadow: var(--shadow); animation: appear .6s .4s both;
}

.res-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 290px; animation: appear .6s .45s both; }

/* ── ACHIEVEMENTS ── */
#screen-achievements { gap: 14px; }

.ach-card {
  background: white; border-radius: 20px;
  padding: 14px 18px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 14px;
}
.ach-card.dim { opacity: .4; filter: grayscale(80%); }
.ach-ic   { font-size: 44px; flex-shrink: 0; }
.ach-nm   { font-size: 16px; font-weight: 800; margin-bottom: 3px; }
.ach-ds   { font-size: 12px; color: #9B6B9B; }
.ach-chk  { font-size: 22px; margin-left: auto; }
</style>
</head>
<body>
<div class="container">

<!-- 標題畫面 -->

<!-- 結果畫面 -->

</div>

<!-- 成就畫面 -->

</div><!-- /container -->

// ── 狀態 ─────────────────────────────────────────────────────
let S = {
  xp: 0,
  ach: [],
  worlds: [
    { lv: [null,null,null] },
    { lv: [null,null,null] },
    { lv: [null,null,null] },
    { lv: [null,null,null] }
  ],
  curW: 0, curL: 0
}

let G = {
  qs: [], qi: 0, score: 0,
  timer: null, timeLeft: 15, done: false,
  newAch: []
}

// ── 儲存 ─────────────────────────────────────────────────────
function save() { try { localStorage.setItem('mathAdv', JSON.stringify(S)) } catch(e){} }
function load() {
  try {
    const d=localStorage.getItem('mathAdv')
    if(d) {
      S=JSON.parse(d)
      // 相容舊存檔：補上第 4 世界
      if(!S.worlds[3]) S.worlds.push({ lv:[null,null,null] })
    }
  } catch(e){}
}

// ── 問題產生 ──────────────────────────────────────────────────
function genQ(world, level, diff) {
  // 第 4 世界：全部為應用題
  if (world === 3) {
    const bank = STORY_Q[3] && STORY_Q[3][diff] ? shuffle([...STORY_Q[3][diff]]) : []
    return bank.slice(0, 10).map(sq => {
      const q = { type:'story', story:sq.story, text:'答案是多少？', ans:sq.ans }
      q.opts = makeOpts(q.ans)
      return q
    })
  }

  // 世界 0-2：計算題為主，進階難度混入應用題
  const storyCount = diff==='hard' ? 4 : diff==='mid' ? 2 : 0
  const bank = STORY_Q[world] && STORY_Q[world][diff] ? shuffle([...STORY_Q[world][diff]]) : []
  const stories = bank.slice(0, Math.min(storyCount, bank.length))

  const slots = new Set()
  while (slots.size < stories.length) slots.add(Math.floor(Math.random()*10))

  let si = 0
  const qs = []
  for (let i=0; i<10; i++) {
    let q
    if (slots.has(i) && si < stories.length) {
      const sq = stories[si++]
      q = { type:'story', story:sq.story, text:'答案是多少？', ans:sq.ans }
    } else {
      if (world===0) q=addQ(diff)
      else if (world===1) q=subQ(diff)
      else q=mulQ(level)
    }
    q.opts = makeOpts(q.ans)
    qs.push(q)
  }
  return qs
}

function addQ(diff) {
  let a, b
  if (diff==='easy')      { a=r(1,5); b=r(1,5-a+1)||1 }
  else if (diff==='mid')  { a=r(5,29); b=r(1,20) }
  else                    { a=r(10,59); b=r(10,100-a) }
  return { text:`${a} + ${b} = ?`, ans: a+b }
}

function subQ(diff) {
  let a, b
  if (diff==='easy')      { b=r(1,4); a=r(b+1,9) }
  else if (diff==='mid')  { b=r(1,19); a=r(b+1,50) }
  else                    { b=r(10,49); a=r(b+1,99) }
  return { text:`${a} - ${b} = ?`, ans: a-b }
}

function mulQ(level) {
  const pools = [[2,3],[4,5],[2,3,4,5]]
  const a = pools[level][Math.floor(Math.random()*pools[level].length)]
  const b = r(1,9)
  return { text:`${a} × ${b} = ?`, ans: a*b }
}

function makeOpts(correct) {
  const set = new Set([correct])
  let tries=0
  while(set.size<4 && tries<60) {
    tries++
    const d = r(-8,8) || 1
    const w = correct+d
    if (w>0 && w!==correct) set.add(w)
  }
  let fill=1
  while(set.size<4) { if(!set.has(correct+fill)) set.add(correct+fill); fill++ }
  return shuffle([...set])
}

function r(a,b) { return Math.floor(Math.random()*(b-a+1))+a }
function shuffle(a) {
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]] }
  return a
}

// ── 畫面切換 ──────────────────────────────────────────────────
function go(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById('screen-'+name).classList.add('active')
  if(name==='title')        refreshTitle()
  if(name==='worlds')       refreshWorlds()
  if(name==='achievements') renderAch()
}

// ── 標題畫面 ──────────────────────────────────────────────────
function refreshTitle() {
  document.getElementById('titleXP').textContent = `✨ 總經驗值：${S.xp} XP`
}

// ── 世界畫面 ──────────────────────────────────────────────────
function refreshWorlds() {
  WORLDS.forEach((_,wi)=>{
    const unlocked = wi===0 || worldDone(wi-1)
    const card = document.getElementById('wc'+wi)
    card.classList.toggle('locked', !unlocked)
    card.classList.toggle('done', worldDone(wi))
    const lock = document.getElementById('wl'+wi)
    if(lock) lock.style.display = unlocked ? 'none' : 'block'
    S.worlds[wi].lv.forEach((sc,li)=>{
      const d=document.getElementById(`d${wi}${li}`)
      if(d) d.classList.toggle('lit', sc!==null && sc>=7)
    })
  })
}

function worldDone(wi) { return S.worlds[wi].lv.every(s=>s!==null && s>=7) }

function pickWorld(wi) {
  if(wi!==0 && !worldDone(wi-1)) {
    const c=document.getElementById('wc'+wi)
    c.style.animation='shake .4s'
    setTimeout(()=>c.style.animation='',500)
    return
  }
  S.curW=wi
  openLevels(wi)
}

// ── 關卡畫面 ──────────────────────────────────────────────────
function openLevels(wi) {
  const w=WORLDS[wi]
  document.getElementById('lvTitle').textContent=w.name
  const con=document.getElementById('lvCards')
  con.innerHTML=''

  LV_CFG[wi].forEach((cfg,li)=>{
    const prev = li===0 || (S.worlds[wi].lv[li-1]!==null && S.worlds[wi].lv[li-1]>=7)
    const locked=!prev
    const sc=S.worlds[wi].lv[li]
    const done=sc!==null && sc>=7

    const card=document.createElement('div')
    card.className='lv-card'+(locked?' locked':'')+(done?' done':'')
    card.style.marginBottom='12px'

    const cols=['#FF85A1','#C9A0DC','#50C878']
    const stars=sc===null ? (locked?'🔒':'☆☆☆') : '⭐'.repeat(sc>=10?3:sc>=8?2:1)+'☆'.repeat(sc>=10?0:sc>=8?1:2)

    card.innerHTML=`
      <div class="lv-num" style="background:linear-gradient(135deg,${cols[li]}cc,${cols[li]}66)">${li+1}</div>
      <div style="flex:1">
        <div class="lv-nm">第 ${li+1} 關：${cfg.name}</div>
        <div class="lv-hint">${cfg.hint}</div>
      </div>
      <div class="stars">${stars}</div>`

    if(!locked) card.onclick=()=>startGame(wi,li)
    con.appendChild(card)
  })

  go('levels')
}

// ── 遊戲邏輯 ──────────────────────────────────────────────────
function startGame(wi,li) {
  S.curW=wi; S.curL=li
  const cfg=LV_CFG[wi][li]
  G = { qs:genQ(wi,li,cfg.diff), qi:0, score:0, timer:null, timeLeft:15, done:false, newAch:[] }
  // 確保計時條在非進階世界時顯示
  document.getElementById('timerBar').style.display = wi===3 ? 'none' : 'block'
  go('game')
  renderQ()
}

function renderQ() {
  const q=G.qs[G.qi]
  document.getElementById('gProg').textContent=`題目 ${G.qi+1} / 10`
  document.getElementById('gScore').textContent=`答對 ${G.score} 題`
  document.getElementById('gChar').textContent=WORLDS[S.curW].char
  document.getElementById('gChar').className='game-char'

  // 應用題：顯示故事泡泡；一般計算題：隱藏
  const storyBubble=document.getElementById('storyBubble')
  if (q.type==='story') {
    document.getElementById('storyText').textContent=q.story
    storyBubble.style.display='block'
    document.getElementById('qText').textContent='答案是多少？'
  } else {
    storyBubble.style.display='none'
    document.getElementById('qText').textContent=q.text
  }

  const con=document.getElementById('choices')
  con.innerHTML=''
  q.opts.forEach(v=>{
    const btn=document.createElement('button')
    btn.className='choice'
    btn.textContent=v
    btn.dataset.v=v
    btn.onclick=()=>answer(v,q.ans)
    con.appendChild(btn)
  })

  document.getElementById('feedback').textContent=''
  document.getElementById('feedback').className='feedback'
  G.done=false
  tickTimer()
}

function tickTimer() {
  clearInterval(G.timer)
  const bar=document.getElementById('timerBar')

  // 進階挑戰世界：拿掉計時，讓孩子好好想
  if(S.curW===3) {
    bar.style.display='none'
    return
  }

  bar.style.display='block'
  G.timeLeft=15
  bar.style.width='100%'
  bar.className='timer-fill'

  G.timer=setInterval(()=>{
    G.timeLeft--
    bar.style.width=(G.timeLeft/15*100)+'%'
    if(G.timeLeft<=5) bar.className='timer-fill danger'
    else if(G.timeLeft<=8) bar.className='timer-fill warn'
    if(G.timeLeft<=0){ clearInterval(G.timer); if(!G.done) timeout() }
  },1000)
}

function timeout() {
  G.done=true
  const ans=G.qs[G.qi].ans
  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true
    if(parseInt(b.dataset.v)===ans) b.classList.add('reveal')
  })
  setFB(`答案是 ${ans}，下次加油！`,'no')
  document.getElementById('gChar').className='game-char oops'
  setTimeout(next,2000)
}

function answer(chosen,correct) {
  if(G.done) return
  G.done=true
  clearInterval(G.timer)
  const t=15-G.timeLeft
  const ok=chosen===correct

  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true
    const v=parseInt(b.dataset.v)
    if(v===correct) b.classList.add('correct')
    else if(v===chosen && !ok) b.classList.add('wrong')
  })

  if(ok) {
    G.score++
    document.getElementById('gChar').className='game-char ding'
    setFB(PRAISE[Math.floor(Math.random()*PRAISE.length)],'ok')
    if(t<=5) unlock('speed')
    unlock('first')
  } else {
    document.getElementById('gChar').className='game-char oops'
    setFB(MISS[Math.floor(Math.random()*MISS.length)],'no')
  }
  setTimeout(next,1500)
}

function setFB(msg,cls) {
  const el=document.getElementById('feedback')
  el.textContent=msg
  el.className='feedback '+cls
}

function next() {
  G.qi++
  if(G.qi>=10) endGame()
  else renderQ()
}

function endGame() {
  const wi=S.curW, li=S.curL, sc=G.score
  const prev=S.worlds[wi].lv[li]
  if(prev===null||sc>prev) S.worlds[wi].lv[li]=sc

  const xp=sc*10+(sc===10?50:0)
  S.xp+=xp

  if(sc===10) unlock('perfect')
  if(worldDone(0)) unlock('w0')
  if(worldDone(1)) unlock('w1')
  if(worldDone(2)) unlock('w2')
  if(worldDone(3)) unlock('w3')
  if(S.ach.includes('w0')&&S.ach.includes('w1')&&S.ach.includes('w2')&&S.ach.includes('w3')) unlock('champ')
  if(S.xp>=100) unlock('xp100')
  if(S.xp>=500) unlock('xp500')
  save()

  const pass=sc>=7
  document.getElementById('resChar').textContent = pass?(sc===10?'🥳':'🎉'):'💪'
  document.getElementById('resTitle').textContent = sc===10?'完美滿分！！！':pass?'過關了！太棒了！':'再試一次！你可以的！'
  document.getElementById('resTitle').style.color = pass?'#2E7D32':'#C62828'
  document.getElementById('resBig').textContent = `${sc} / 10`
  document.getElementById('resXP').textContent = `+${xp} XP 經驗值`

  const achEl=document.getElementById('resAch')
  if(G.newAch.length>0){
    const a=ACH_DEF.find(x=>x.id===G.newAch[0])
    achEl.textContent=`🏆 新成就：${a.ic} ${a.nm}`
    achEl.style.display='block'
  } else { achEl.style.display='none' }

  const btn=document.getElementById('resMainBtn')
  if(pass && li<2) {
    btn.textContent='繼續下一關 →'
    btn.onclick=()=>startGame(wi,li+1)
  } else if(pass && li===2 && wi<3) {
    btn.textContent=`前往 ${WORLDS[wi+1].name} →`
    btn.onclick=()=>{ S.curW=wi+1; openLevels(wi+1) }
  } else if(pass && li===2 && wi===3) {
    btn.textContent='🎊 恭喜全部通關！數學冠軍！'
    btn.onclick=()=>go('title')
  } else {
    btn.textContent='重新挑戰 ↺'
    btn.onclick=()=>startGame(wi,li)
  }

  go('result')
}

function unlock(id) {
  if(!S.ach.includes(id)){ S.ach.push(id); G.newAch.push(id) }
}

// ── 成就畫面 ──────────────────────────────────────────────────
function renderAch() {
  const con=document.getElementById('achList')
  con.innerHTML=''
  ACH_DEF.forEach(a=>{
    const got=S.ach.includes(a.id)
    const card=document.createElement('div')
    card.className='ach-card'+(got?'':' dim')
    card.style.marginBottom='10px'
    card.innerHTML=`
      <div class="ach-ic">${a.ic}</div>
      <div><div class="ach-nm">${a.nm}</div><div class="ach-ds">${a.ds}</div></div>
      <div class="ach-chk">${got?'✅':''}</div>`
    con.appendChild(card)
  })
}

load()
refreshTitle()
